<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ログイン</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 480px;
            margin: 64px auto;
            padding: 0 16px;
            color: #222;
            line-height: 1.6;
        }
        .card {
            border: 1px solid #dadada;
            border-radius: 12px;
            padding: 24px;
            background: #fff;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 18px;
            border: 0;
            border-radius: 10px;
            background: #1d4ed8;
            color: #fff;
            cursor: pointer;
        }
        .errorlist {
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>ログイン</h1>
        <p>弁当屋向けの管理画面を見るにはログインが必要です。</p>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div>
                <label for="{{ form.username.id_for_label }}">ユーザー名</label>
                {{ form.username }}
            </div>
            <div>
                <label for="{{ form.password.id_for_label }}">パスワード</label>
                {{ form.password }}
            </div>
            <button type="submit">ログインする</button>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
        </form>
    </div>
</body>
</html>
