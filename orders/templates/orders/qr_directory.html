<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>QR 一覧</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 16px 40px;
            color: #222;
            line-height: 1.6;
        }
        .company-box {
            border: 1px solid #dadada;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
            background: #fff;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .qr-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 14px;
        }
        .qr-card img {
            width: 180px;
            height: 180px;
            display: block;
            margin-bottom: 12px;
        }
        .link {
            word-break: break-all;
        }
        a {
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <h1>QR 一覧</h1>
    <p>
        <a href="{% url 'orders:dashboard' %}">ダッシュボード</a>
        <a href="{% url 'orders:company-directory' %}">企業・部署一覧</a>
    </p>

    {% for company in company_rows %}
    <div class="company-box">
        <h2>{{ company.name }}</h2>
        <div class="qr-grid">
            {% for department in company.departments %}
            <div class="qr-card">
                <img src="{{ department.qr_data_uri }}" alt="{{ department.name }} のQRコード">
                <p><strong>{{ department.name }}</strong></p>
                <p class="link"><a href="{{ department.order_url }}">{{ department.order_url }}</a></p>
            </div>
            {% empty %}
            <p>有効な部署がありません。</p>
            {% endfor %}
        </div>
    </div>
    {% empty %}
    <p>有効な企業がありません。</p>
    {% endfor %}
</body>
</html>
